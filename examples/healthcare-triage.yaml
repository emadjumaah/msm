msm_version: "1.0"
manifest_id: "healthcare-triage-v1"
domain: "healthcare-triage"
region: "general"
created: "2026-04-12"

layers:
  translation:
    provider: http
    model: "nllb-200-600m"
    version: "2.1"
    fine_tuned: true
    dataset: "medical-terminology-multilingual-v1"
    endpoint: "http://localhost:8001/translate"
    mode: "translated"

  classification:
    provider: http
    model: "mdeberta-v3-medical"
    version: "1.0"
    fine_tuned: true
    dataset: "symptom-intent-classification-v2"
    endpoint: "http://localhost:8002/classify"

  orchestration:
    provider: http
    model: "qwen2.5-3b-medical"
    version: "1.0"
    fine_tuned: true
    dataset: "clinical-triage-workflows-v1"
    endpoint: "http://localhost:8003/orchestrate"

  execution:
    provider: http
    model: "functionary-small-v3"
    version: "1.1"
    fine_tuned: false
    endpoint: "http://localhost:8004/execute"

  generation:
    provider: http
    model: "qwen2.5-0.5b-medical"
    version: "1.0"
    fine_tuned: true
    dataset: "patient-communication-v1"
    endpoint: "http://localhost:8005/generate"

  validation:
    provider: http
    model: "minicheck-medical"
    version: "1.0"
    fine_tuned: true
    dataset: "medical-safety-policy-v1"
    endpoint: "http://localhost:8006/validate"

# ─── Hooks — domain-specific extensions (no core changes) ────
hooks:
  image_analysis:
    provider: http
    model: "medclip-v1"
    version: "1.0"
    point: "before:classification"
    endpoint: "http://localhost:8010/analyze-image"
    fine_tuned: true
    dataset: "radiology-xray-ct-v2"

  drug_interaction_check:
    provider: http
    model: "drugcheck-v1"
    version: "1.0"
    point: "after:generation"
    endpoint: "http://localhost:8011/drug-check"
    fine_tuned: true
    dataset: "fda-interaction-db-v3"
