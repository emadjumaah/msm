# STATUS: Blueprint only. Requires external model servers.
# To run locally, change all providers to: dummy or ollama

msm_version: "1.0"
manifest_id: "education-tutoring-v1"
domain: "education-tutoring"
region: "general"
created: "2026-04-12"

layers:
  translation:
    provider: http
    model: "nllb-200-600m"
    version: "2.1"
    fine_tuned: true
    dataset: "academic-terminology-multilingual-v1"
    endpoint: "http://localhost:8001/translate"
    mode: "translated"

  classification:
    provider: http
    model: "mdeberta-v3-education"
    version: "1.0"
    fine_tuned: true
    dataset: "student-intent-classification-v1"
    endpoint: "http://localhost:8002/classify"
    intents:
      - concept_explanation
      - problem_solving
      - quiz_request
      - homework_help
      - study_plan
      - progress_check
      - resource_request

  orchestration:
    provider: http
    model: "qwen2.5-3b-education"
    version: "1.0"
    fine_tuned: true
    dataset: "tutoring-workflows-v1"
    endpoint: "http://localhost:8003/orchestrate"

  generation:
    provider: http
    model: "qwen2.5-0.5b-education"
    version: "1.0"
    fine_tuned: true
    dataset: "pedagogical-explanation-v1"
    endpoint: "http://localhost:8005/generate"
    tone: "encouraging"

  validation:
    provider: http
    model: "education-validator-v1"
    version: "1.0"
    fine_tuned: true
    dataset: "factual-accuracy-academic-v1"
    endpoint: "http://localhost:8006/validate"

# ─── Hooks — domain-specific extensions ──────────────────────
hooks:
  difficulty_assessment:
    provider: http
    model: "difficulty-scorer-v1"
    version: "1.0"
    point: "after:classification"
    endpoint: "http://localhost:8010/assess-difficulty"
    fine_tuned: true
    dataset: "student-level-assessment-v2"

  plagiarism_check:
    provider: http
    model: "plagiarism-detector-v1"
    version: "1.0"
    point: "after:generation"
    endpoint: "http://localhost:8011/plagiarism-check"
